<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal - Subjects</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7fe; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #333; transition: 0.3s; }
        .card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .icon { width: 40px; height: 40px; background: #eef2ff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #5a67d8; margin-right: 15px; }
        .info { flex-grow: 1; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress { height: 100%; background: #48bb78; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">My Batches</h2>
    <div class="grid">
        <a href="chapters.html" class="card">
            <div class="icon">Re</div>
            <div class="info">
                <strong>Reasoning</strong>
                <div class="progress-bar"><div class="progress" style="width: 19%;"></div></div>
            </div>
            <span>19% ></span>
        </a>
        </div>
</body>
</html>
